name: Run Gatling Simulation

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Git repository URL'
        required: true
        default: 'https://github.com/user/repo.git'
      feature_path:
        description: 'Karate feature (optional)'
        required: false
        default: ''
      simulation_class:
        description: 'Gatling Simulation Class (FQCN)'
        required: true
        default: 'simulations.customers.CustomersSimulation'
      branch:
        description: 'Branch to clone'
        required: false
        default: 'main'

jobs:
  run-gatling:
    runs-on: ubuntu-latest

    steps:

      # ✅ Checkout vacío (no el repo actual)
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      # ✅ Clonar repo dinámico
      - name: Clone target repo
        run: |
          git clone -b ${{ github.event.inputs.branch }} ${{ github.event.inputs.repo_url }} project
          cd project
          ls -la

      # ✅ Setup Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Cache Maven (opcional pero recomendado)
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      # ✅ Ejecutar Gatling
      - name: Run Gatling Simulation
        working-directory: ./project
        run: |
          echo "Running simulation: ${{ github.event.inputs.simulation_class }}"
          
          mvn clean gatling:test \
          -Dgatling.simulationClass=${{ github.event.inputs.simulation_class }}

      # ✅ (Opcional) Ejecutar con Karate feature/tag
      - name: Run with Karate Feature (optional)
        if: ${{ github.event.inputs.feature_path != '' }}
        working-directory: ./project
        run: |
          mvn clean gatling:test \
          -Dgatling.simulationClass=${{ github.event.inputs.simulation_class }} \
          -Dkarate.options="--tags @${{ github.event.inputs.feature_path }}"
