name: Pruebas funcionales
run-name: Funcional - ${{ github.event.inputs.functional_tag }}

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Git repository URL'
        required: true
        default: 'https://github.com/user/repo.git'
      branch:
        description: 'Branch to clone'
        required: false
        default: 'main'
      functional_tag:
        description: 'tag execution'
        required: true
        default: '@Smoke'
      enviroment:
        description: 'Ambiente para ejecutar pruebas'
        required: true
        default: 'qa'

jobs:
  run-gatling:
    runs-on: ubuntu-latest

    steps:

      # ✅ Checkout vacío (no el repo actual)
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      # ✅ Clonar repo dinámico
      - name: Clone target repo
        run: |
          git clone -b ${{ github.event.inputs.branch }} ${{ github.event.inputs.repo_url }} project
          cd project
          ls -la

      # ✅ Setup Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Cache Maven (opcional pero recomendado)
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      # ✅ Ejecutar Pruebas
      - name: Run functional tests
        working-directory: ./project
        run: |
          echo "Running tests: ${{ github.event.inputs.functional_tag }}"
          
          mvn clean test \
          -Dkarate.options=--tags ${{ github.event.inputs.functional_tag }} -Dkarate.options="--debug"  -Ddriver=karate -Dkarate.env=${{ github.event.inputs.enviroment }}
      
  
      # ✅ Subir resultados como artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: functional-report
          path: |
            project/allure-report/**
          if-no-files-found: warn
